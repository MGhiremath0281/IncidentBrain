server:
  port: 8089

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/jira_db
    username: postgres
    password: secret

  jpa:
    hibernate:
      ddl-auto: update

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: jira-orchestrator-group
      auto-offset-reset: earliest

  cloud:
    eureka:
      client:
        service-url:
          defaultZone: http://localhost:8761/eureka/
        register-with-eureka: true
        fetch-registry: true

  eureka:
    instance:
      prefer-ip-address: true
      instance-id: ${spring.application.name}:${random.uuid}

encryption:
  master-key: ${ENCRYPTION_MASTER_KEY}
