spring:
  application:
    name: testing-service

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, metrics, info

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ${spring.application.name}

  info:
    env:
      enabled: true

info:
  app:
    name: testing-service
    version: 0.0.1
    deployment: docker
    container: ${HOSTNAME:local}
    java: ${java.version}